<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>江城往事 — 解码武汉1800年历史</title>
<style>
/* ============================================================
   RESET & BASE — 淡雅宣纸风格
   ============================================================ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --paper:#FAF0E6; --paper-dark:#E8DCC8; --ink:#3C2F28; --ink-light:#6B5D4F; --ink-faint:#A89880;
  --water:#B0E0E6; --water-dark:#8CC5CF;
  --route-kb:#8B4513; --route-sy:#C75B39; --route-hy:#708090; --route-gc:#5F9EA0;
  --gold:#B8860B; --success:#5B8C5A; --accent:#D4A574;
  --header-h:44px; --tab-h:48px; --bottom-h:60px; --radius:12px;
  --font-display:"Noto Serif SC","STSong","SimSun","Songti SC",serif;
  --font-body:"PingFang SC","Microsoft YaHei","Helvetica Neue",sans-serif;
}
html,body{
  height:100%;width:100%;overflow:hidden;
  font-family:var(--font-body);color:var(--ink);background:var(--paper);
  -webkit-tap-highlight-color:transparent;
}
button{border:none;cursor:pointer;font-family:inherit;color:inherit;background:none}
input{font-family:inherit;border:none;outline:none;background:none;color:inherit}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--ink-faint);border-radius:2px}

/* ============================================================
   HEADER
   ============================================================ */
#header{
  position:fixed;top:0;left:0;right:0;z-index:100;height:var(--header-h);
  display:flex;align-items:center;padding:0 14px;gap:10px;
  background:linear-gradient(180deg,rgba(250,240,230,.98),rgba(250,240,230,.88));
  backdrop-filter:blur(12px);border-bottom:1px solid rgba(139,69,19,.12);
}
.header-title{
  font-family:var(--font-display);font-size:18px;font-weight:700;letter-spacing:2px;
  color:var(--ink);white-space:nowrap;
}
.header-sub{font-size:11px;color:var(--ink-light);white-space:nowrap;font-family:var(--font-display)}
.header-progress{margin-left:auto;display:flex;align-items:center;gap:6px;font-size:12px;color:var(--ink-light)}
.header-progress strong{color:var(--gold);font-size:16px;font-family:var(--font-display)}
.header-progress-bar{width:52px;height:5px;background:var(--paper-dark);border-radius:3px;overflow:hidden}
.header-progress-bar .fill{height:100%;background:linear-gradient(90deg,var(--route-sy),var(--gold));border-radius:3px;transition:width .5s cubic-bezier(.4,0,.2,1)}

/* ============================================================
   ROUTE TABS
   ============================================================ */
#routeTabs{
  position:fixed;top:var(--header-h);left:0;right:0;z-index:99;height:var(--tab-h);
  display:flex;align-items:center;gap:6px;padding:0 10px;
  background:linear-gradient(180deg,rgba(250,240,230,.96),rgba(250,240,230,.84));
  backdrop-filter:blur(12px);overflow-x:auto;overflow-y:hidden;
  -webkit-overflow-scrolling:touch;
}
.tab-btn{
  flex-shrink:0;display:flex;align-items:center;gap:5px;padding:8px 14px;
  border-radius:20px;font-size:12px;font-weight:600;letter-spacing:.5px;
  background:rgba(0,0,0,.04);color:var(--ink-light);
  transition:all .35s cubic-bezier(.4,0,.2,1);
  border:1.5px solid transparent;white-space:nowrap;
  font-family:var(--font-display);
}
.tab-btn .tab-icon{font-size:14px;transition:transform .3s}
.tab-btn .tab-count{font-size:10px;opacity:.7}
.tab-btn:hover{background:rgba(0,0,0,.07);color:var(--ink)}
.tab-btn.active{color:#fff!important;border-color:var(--route-color);background:var(--route-color)!important;box-shadow:0 2px 12px var(--route-glow)}
.tab-btn.active .tab-icon{transform:scale(1.25)}
.tab-btn.route-kb{--route-color:var(--route-kb);--route-glow:rgba(139,69,19,.3)}
.tab-btn.route-sy{--route-color:var(--route-sy);--route-glow:rgba(199,91,57,.3)}
.tab-btn.route-hy{--route-color:var(--route-hy);--route-glow:rgba(112,128,144,.3)}
.tab-btn.route-gc{--route-color:var(--route-gc);--route-glow:rgba(95,158,160,.3)}

/* ============================================================
   MAP CONTAINER
   ============================================================ */
#mapContainer{
  position:fixed;top:calc(var(--header-h) + var(--tab-h));left:0;right:0;bottom:var(--bottom-h);
  background:var(--paper);
}
#amap{width:100%;height:100%}

/* 自定义标记样式（HTML content） */
.history-pin{
  width:40px;height:40px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-family:Georgia,'Times New Roman',serif;font-weight:900;
  font-size:13px;color:#fff;cursor:pointer;
  transition:transform .25s cubic-bezier(.34,1.56,.64,1),box-shadow .25s;
  position:relative;user-select:none;
}
.history-pin::after{
  content:'';position:absolute;bottom:-5px;left:50%;transform:translateX(-50%);
  width:0;height:0;border-left:6px solid transparent;border-right:6px solid transparent;
  border-top:6px solid inherit;
}
.history-pin:hover{transform:scale(1.35);z-index:999}
.history-pin.locked{background:#B8A898!important;border:2px solid #ccc!important;box-shadow:none!important}
.history-pin.unlocked{box-shadow:0 0 12px currentColor;animation:pin-glow 2.5s ease-in-out infinite}
@keyframes pin-glow{0%,100%{box-shadow:0 0 4px currentColor}50%{box-shadow:0 0 16px currentColor,0 0 24px currentColor}}

/* 地图信息窗 */
.amap-info-content{padding:0!important;background:transparent!important;border:none!important;box-shadow:none!important}
.custom-info{
  background:rgba(255,252,245,.96);backdrop-filter:blur(20px);padding:14px 17px;
  border-radius:14px;color:var(--ink);min-width:190px;
  border:1px solid rgba(139,69,19,.2);box-shadow:0 4px 24px rgba(0,0,0,.08);
  font-family:var(--font-display);
}
.custom-info .ci-name{font-size:15px;font-weight:700;margin-bottom:2px}
.custom-info .ci-year{font-size:12px;color:var(--ink-light);margin-bottom:5px}
.custom-info .ci-btn{
  display:inline-block;padding:7px 18px;border-radius:10px;font-size:12px;font-weight:700;
  color:#fff;cursor:pointer;transition:all .25s;
  font-family:var(--font-display);margin-top:6px;
}
.custom-info .ci-btn:hover{transform:scale(1.04);opacity:.9}
.custom-info .ci-btn.unlocked{background:var(--success)!important}

/* ============================================================
   DETAIL OVERLAY + CARD
   ============================================================ */
#detailOverlay{
  position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.35);
  display:flex;align-items:flex-end;justify-content:center;
  opacity:0;visibility:hidden;transition:opacity .3s,visibility .3s;
}
#detailOverlay.show{opacity:1;visibility:visible}
#detailCard{
  width:100%;max-width:500px;max-height:92vh;overflow-y:auto;overflow-x:hidden;
  background:linear-gradient(180deg,#FFFCF5,#FAF0E6);
  border-radius:20px 20px 0 0;border-top:3px solid var(--route-color,var(--ink));
  box-shadow:0 -6px 32px rgba(0,0,0,.1);transition:transform .4s cubic-bezier(.4,0,.2,1);
  transform:translateY(20px);
}
#detailOverlay.show #detailCard{transform:translateY(0)}

.card-color-bar{height:5px;background:var(--route-color,var(--ink))}
.card-header{padding:20px 20px 10px;display:flex;align-items:flex-start;gap:14px}
.card-num{
  font-family:var(--font-display);font-size:30px;font-weight:900;
  color:var(--route-color,var(--ink));opacity:.5;line-height:1;min-width:44px;
}
.card-info{flex:1}
.card-name{font-family:var(--font-display);font-size:20px;font-weight:800;letter-spacing:1px;color:var(--ink)}
.card-year{font-size:13px;color:var(--ink-light);margin-top:2px;font-family:var(--font-display)}
.card-close{
  width:34px;height:34px;border-radius:50%;background:rgba(0,0,0,.06);
  display:flex;align-items:center;justify-content:center;font-size:15px;
  color:var(--ink-light);transition:all .2s;flex-shrink:0;
}
.card-close:hover{background:rgba(0,0,0,.12);color:var(--ink)}

.card-body{padding:0 20px 20px}
.card-desc{font-size:13px;line-height:1.8;color:var(--ink-light);margin-bottom:12px;font-family:var(--font-display)}

/* === 老照片卡片区 === */
.photo-card-title{
  font-family:var(--font-display);font-size:13px;font-weight:700;color:var(--ink);
  margin-bottom:10px;display:flex;align-items:center;gap:6px;
}
.photo-card-title span{font-size:16px}

/* 双图对比区 */
.photo-dual{
  display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px;
}
.photo-box{
  position:relative;padding-top:75%;border-radius:10px;overflow:hidden;
  border:1px solid rgba(0,0,0,.08);cursor:default;
}
.photo-box-inner{
  position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:6px;padding:10px;
}
.photo-box-old .photo-box-inner{
  background:linear-gradient(135deg,#D4C5B2,#C4B5A2);
}
.photo-box-now .photo-box-inner{
  background:linear-gradient(135deg,#C8D8C8,#B8C8B8);
}
.photo-box-emoji{font-size:36px;opacity:.5}
.photo-box-label{
  font-size:10px;font-weight:700;letter-spacing:1px;font-family:var(--font-display);
  padding:3px 10px;border-radius:8px;
}
.photo-box-old .photo-box-label{background:rgba(139,69,19,.15);color:var(--route-kb)}
.photo-box-now .photo-box-label{background:rgba(91,140,90,.15);color:var(--success)}
.photo-box-img{
  position:absolute;inset:0;background-size:cover;background-position:center;
  transition:filter 2s ease;
}
.photo-box-img.blurred{filter:blur(8px) sepia(.5)}
.photo-box-img.clearing{filter:blur(3px) sepia(.3)}
.photo-box-img.clear{filter:blur(0) sepia(0)}

/* 对比滑块 */
.compare-slider-wrap{
  display:flex;align-items:center;gap:10px;margin-bottom:12px;padding:0 4px;
}
.compare-slider-wrap span{
  font-size:11px;color:var(--ink-light);font-family:var(--font-display);flex-shrink:0;
}
.compare-slider{
  -webkit-appearance:none;flex:1;height:5px;border-radius:3px;
  background:linear-gradient(90deg,#D4C5B2,var(--route-gc));outline:none;
}
.compare-slider::-webkit-slider-thumb{
  -webkit-appearance:none;width:24px;height:24px;border-radius:50%;
  background:var(--ink);cursor:pointer;border:2px solid var(--paper);
  box-shadow:0 1px 4px rgba(0,0,0,.2);
}

/* 任务卡片 */
.card-task-box{
  padding:12px 14px;border-radius:var(--radius);background:rgba(0,0,0,.03);
  margin-bottom:12px;font-size:13px;display:flex;align-items:flex-start;gap:10px;
}
.card-task-box .task-icon{font-size:18px;flex-shrink:0}
.card-task-box .task-text{color:var(--ink);font-family:var(--font-display);line-height:1.5}

/* 解锁区 */
.unlock-section{padding:12px 14px;border-radius:var(--radius);background:rgba(0,0,0,.03);margin-top:4px}
.unlock-section h4{font-family:var(--font-display);font-size:14px;margin-bottom:8px;display:flex;align-items:center;gap:8px}
.unlock-steps{list-style:none}
.unlock-steps li{font-size:12px;color:var(--ink-light);padding:3px 0;padding-left:18px;position:relative}
.unlock-steps li::before{content:'▸';position:absolute;left:0;top:3px;font-size:10px;color:var(--route-color,var(--ink))}
.btn-unlock{
  display:block;width:100%;margin-top:10px;padding:12px;border-radius:var(--radius);
  font-family:var(--font-display);font-size:14px;font-weight:700;letter-spacing:1px;
  color:#fff;background:var(--route-color,var(--ink));
  transition:all .3s;text-align:center;
}
.btn-unlock:hover{opacity:.9;transform:translateY(-1px)}
.btn-unlock:active{transform:scale(.97)}
.btn-unlock.success{background:var(--success)!important}
.btn-unlock:disabled{opacity:.6;pointer-events:none}

/* ============================================================
   BOTTOM BAR
   ============================================================ */
#bottomBar{
  position:fixed;bottom:0;left:0;right:0;z-index:100;height:var(--bottom-h);
  display:flex;align-items:center;gap:10px;padding:0 14px;
  background:linear-gradient(0deg,rgba(250,240,230,.98),rgba(250,240,230,.88));
  backdrop-filter:blur(12px);border-top:1px solid rgba(139,69,19,.1);
}
.bottom-progress{font-size:11px;color:var(--ink-light);white-space:nowrap;font-family:var(--font-display)}
.bottom-progress strong{color:var(--route-color,var(--ink))}
.bottom-recent{display:flex;align-items:center;gap:6px;flex:1;overflow:hidden}
.bottom-recent-item{
  width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;
  font-size:13px;flex-shrink:0;transition:all .3s;
  background:rgba(0,0,0,.04);border:1px solid rgba(0,0,0,.06);
}
.bottom-recent-item.placeholder{opacity:.3}
.btn-all-routes{
  flex-shrink:0;padding:7px 14px;border-radius:16px;font-size:11px;font-weight:700;letter-spacing:1px;
  background:rgba(139,69,19,.08);color:var(--route-kb);border:1px solid rgba(139,69,19,.2);
  transition:all .3s;white-space:nowrap;font-family:var(--font-display);
}
.btn-all-routes:hover{background:rgba(139,69,19,.15);transform:translateY(-1px)}
.btn-all-routes.active{background:var(--route-kb);color:#fff;border-color:var(--route-kb)}

/* ============================================================
   TOAST
   ============================================================ */
#toast{
  position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(.8);z-index:500;
  padding:16px 26px;border-radius:18px;background:rgba(60,47,40,.94);
  text-align:center;color:#fff;pointer-events:none;opacity:0;
  transition:all .4s cubic-bezier(.34,1.56,.64,1);
  font-family:var(--font-display);font-size:15px;font-weight:700;
  box-shadow:0 8px 32px rgba(0,0,0,.2);
}
#toast.show{opacity:1;transform:translate(-50%,-50%) scale(1)}
#toast .toast-emoji{font-size:32px;display:block}
#toast .toast-sub{font-size:11px;color:rgba(255,255,255,.6);margin-top:4px;font-weight:400}

/* ============================================================
   LOADING
   ============================================================ */
#loadingScreen{
  position:fixed;inset:0;z-index:9999;background:var(--paper);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;
  transition:opacity .4s,visibility .4s;
}
#loadingScreen.hidden{opacity:0;visibility:hidden;pointer-events:none}
.loading-ring{width:40px;height:40px;border:3px solid var(--paper-dark);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{color:var(--ink-light);font-size:13px;letter-spacing:2px;font-family:var(--font-display)}

/* ============================================================
   FIREWORKS
   ============================================================ */
#fireworksCanvas{position:fixed;inset:0;z-index:350;pointer-events:none;opacity:0;transition:opacity .5s}
#fireworksCanvas.active{opacity:1}

/* ============================================================
   FALLBACK MAP
   ============================================================ */
#fallbackMap{
  width:100%;height:100%;display:none;align-items:center;justify-content:center;
  flex-direction:column;gap:16px;background:var(--paper);
}
#fallbackMap svg{width:100%;max-height:70vh}
.fallback-hint{font-size:12px;color:var(--ink-light);text-align:center;line-height:1.8;font-family:var(--font-display)}
.fallback-hint .retry-btn{color:var(--route-kb);cursor:pointer;text-decoration:underline}

/* ============================================================
   RESPONSIVE
   ============================================================ */
@media (min-width:768px){
  #detailOverlay{align-items:center;justify-content:flex-end;padding:16px}
  #detailCard{border-radius:20px;max-width:440px;max-height:92vh;margin-right:4px;transform:translateX(30px)}
  #detailOverlay.show #detailCard{transform:translateX(0)}
}
@media (max-width:380px){
  .tab-btn{padding:6px 10px;font-size:10px}
  .tab-btn .tab-icon{font-size:12px}
  .card-header{padding:16px 16px 8px}
  .card-body{padding:0 16px 16px}
}
</style>
</head>
<body>

<!-- Loading -->
<div id="loadingScreen">
  <div class="loading-ring"></div>
  <div class="loading-text">正在翻开江城往事...</div>
</div>

<!-- Header -->
<div id="header">
  <span class="header-title">江城往事</span>
  <span class="header-sub">解码武汉 1800 年历史</span>
  <div class="header-progress">
    <span>已解锁</span><strong id="totalCount">0</strong><span>/40</span>
    <div class="header-progress-bar"><div class="fill" id="totalBar" style="width:0%"></div></div>
  </div>
</div>

<!-- Route Tabs -->
<div id="routeTabs">
  <button class="tab-btn route-sy active" data-route="sy" onclick="switchRoute('sy')">
    <span class="tab-icon">⚔️</span>首义之路<span class="tab-count">0/10</span>
  </button>
  <button class="tab-btn route-kb" data-route="kb" onclick="switchRoute('kb')">
    <span class="tab-icon">🏛️</span>开埠风云<span class="tab-count">0/10</span>
  </button>
  <button class="tab-btn route-hy" data-route="hy" onclick="switchRoute('hy')">
    <span class="tab-icon">🏯</span>汉阳寻根<span class="tab-count">0/10</span>
  </button>
  <button class="tab-btn route-gc" data-route="gc" onclick="switchRoute('gc')">
    <span class="tab-icon">🏘️</span>古城新韵<span class="tab-count">0/10</span>
  </button>
</div>

<!-- Map -->
<div id="mapContainer">
  <div id="amap"></div>
  <div id="fallbackMap">
    <svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
      <rect width="800" height="600" fill="#FAF0E6"/>
      <text x="400" y="270" text-anchor="middle" fill="#6B5D4F" font-size="18" font-family="serif">🗺️ 武汉老城手绘地图</text>
      <text x="400" y="300" text-anchor="middle" fill="#A89880" font-size="12">长江与汉水在此交汇</text>
      <text x="400" y="340" text-anchor="middle" fill="#6B5D4F" font-size="13">需要网络连接加载高德地图</text>
    </svg>
    <div class="fallback-hint">地图未加载成功 <span class="retry-btn" onclick="location.reload()">点击重试</span></div>
  </div>
</div>

<!-- Bottom Bar -->
<div id="bottomBar">
  <div class="bottom-progress" id="bottomProgress">⚔️ 首义之路 <strong>0/10</strong></div>
  <div class="bottom-recent" id="bottomRecent">
    <div class="bottom-recent-item placeholder">📜</div><div class="bottom-recent-item placeholder">📜</div><div class="bottom-recent-item placeholder">📜</div>
  </div>
  <button class="btn-all-routes" id="btnAllRoutes" onclick="switchRoute('all')">🗺️ 全部路线</button>
</div>

<!-- Detail Overlay -->
<div id="detailOverlay" onclick="if(event.target===this)closeDetail()">
  <div id="detailCard"></div>
</div>

<!-- Toast -->
<div id="toast"><span class="toast-emoji"></span><span class="toast-sub"></span></div>

<!-- Fireworks Canvas -->
<canvas id="fireworksCanvas"></canvas>

<script>
'use strict';

/* ================================================================
   DATA: 40 LOCATIONS, 4 ROUTES
   ================================================================ */
const ROUTES = {
  kb:{ id:'kb', name:'开埠风云', icon:'🏛️', color:'#8B4513', desc:'租界时代的汉口，百年前的开埠记忆' },
  sy:{ id:'sy', name:'首义之路', icon:'⚔️', color:'#C75B39', desc:'辛亥革命第一枪，改变中国命运' },
  hy:{ id:'hy', name:'汉阳寻根', icon:'🏯', color:'#708090', desc:'从春秋到洋务，汉阳的千年积淀' },
  gc:{ id:'gc', name:'古城新韵', icon:'🏘️', color:'#5F9EA0', desc:'武昌古城新生，历史与现代的交织' }
};

/* 老照片URL占位（后续可替换真实URL） */
const getOldPhotoUrl = function(id){
  var urls = {
    'H-01': 'https://p1.ssl.qhmsg.com/t01f3f79c5c27c93c51.jpg',
    'H-08': 'https://p1.ssl.qhmsg.com/t01f3f79c5c27c93c51.jpg',
    'H-19': 'http://image109.360doc.com/DownloadImg/2021/05/1510/222174303_6_20210515101303427_wm'
  };
  return urls[id] || '';
};

const POINTS = [
  /* ===== 路线1：开埠风云（10个）===== */

/* ================================================================
   GAME STATE
   ================================================================ */
let currentRoute = 'sy';
let unlocked = {};
let map = null;
let markers = {};
let polylines = {};
let activeInfoWindow = null;
let mapLoaded = false;
let detailPointId = null;

try{var s=localStorage.getItem('wh_history_unlocked');if(s)unlocked=JSON.parse(s)}catch(e){}
function saveState(){try{localStorage.setItem('wh_history_unlocked',JSON.stringify(unlocked))}catch(e){}}
function isUnlocked(id){return!!unlocked[id]}
function setUnlocked(id){unlocked[id]=true;saveState()}
function countRoute(routeId){return POINTS.filter(function(p){return p.route===routeId&&isUnlocked(p.id)}).length}
function totalUnlocked(){return POINTS.filter(function(p){return isUnlocked(p.id)}).length}

/* ================================================================
   FIND POINT BY ID
   ================================================================ */
function findPoint(id){return POINTS.find(function(p){return p.id===id})}

/* ================================================================
   MAP INITIALIZATION
   ================================================================ */
const MAP_CENTER = [114.3055, 30.5928];
const MAP_ZOOM = 11;

function initMap(){
  if(typeof AMap==='undefined'){
    showFallback();
    return;
  }
  try{
    map = new AMap.Map('amap',{
      center: MAP_CENTER,
      zoom: MAP_ZOOM,
      mapStyle: 'amap://styles/normal',
      viewMode: '2D',
      resizeEnable: true,
      touchZoom: true,
      dragEnable: true,
      zoomEnable: true,
      doubleClickZoom: true,
      scrollWheel: true,
      showBuildingBlock: false
    });

    map.on('complete', function(){
      mapLoaded = true;
      document.getElementById('loadingScreen').classList.add('hidden');
      document.getElementById('fallbackMap').style.display = 'none';
      document.getElementById('amap').style.display = '';
      createAllMarkers();
      createPolylines();
      refreshRoute();
    });

    // fallback: 如果 complete 事件未触发
    setTimeout(function(){
      if(!mapLoaded && map){
        try{
          var c = map.getCenter();
          if(c){
            mapLoaded = true;
            document.getElementById('loadingScreen').classList.add('hidden');
            document.getElementById('fallbackMap').style.display = 'none';
            document.getElementById('amap').style.display = '';
            createAllMarkers();
            createPolylines();
            refreshRoute();
          }
        }catch(e){}
      }
    }, 3000);
  }catch(e){
    showFallback();
  }
}

function showFallback(){
  document.getElementById('loadingScreen').classList.add('hidden');
  document.getElementById('amap').style.display = 'none';
  document.getElementById('fallbackMap').style.display = 'flex';
}

/* ================================================================
   MARKERS — HTML content markers (圆形邮戳)
   ================================================================ */
function createMarkerHTML(point){
  var cfg = ROUTES[point.route];
  var unlocked = isUnlocked(point.id);
  var yearNum = (point.year||'').replace(/[^0-9]/g,'').slice(-2) || (point.year||'?').slice(0,2);
  var bg = unlocked ? cfg.color : '#B8A898';
  var shadow = unlocked ? '0 0 10px '+cfg.color+', 0 0 20px '+cfg.color : 'none';
  var cls = unlocked ? 'history-pin unlocked' : 'history-pin locked';
  var borderColor = unlocked ? cfg.color : '#ccc';

  return '<div class="'+cls+'" style="background:'+bg+';border:2px solid '+borderColor+';box-shadow:'+shadow+';color:#fff">'+yearNum+'</div>';
}

function createAllMarkers(){
  if(!map)return;
  // 清除旧标记
  Object.keys(markers).forEach(function(k){
    if(markers[k]){markers[k].setMap(null);markers[k]=null}
  });
  markers = {};

  POINTS.forEach(function(point){
    var html = createMarkerHTML(point);
    var marker = new AMap.Marker({
      position: [point.lng, point.lat],
      content: html,
      offset: new AMap.Pixel(-20, -20),
      zIndex: isUnlocked(point.id)?100:50,
      visible: true
    });
    marker._pointData = point;
    // 点击标记 → 直接打开详情卡片
    marker.on('click', function(){
      openDetail(point.id);
    });
    markers[point.id] = marker;
    map.add(marker);
  });
}

function refreshMarker(point){
  var marker = markers[point.id];
  if(!marker)return;
  var html = createMarkerHTML(point);
  marker.setContent(html);
  marker.setzIndex(isUnlocked(point.id)?100:50);
}

/* ================================================================
   POLYLINES — 4条虚线路线
   ================================================================ */
function createPolylines(){
  if(!map)return;
  Object.keys(polylines).forEach(function(k){
    if(polylines[k]){polylines[k].setMap(null)}
  });
  polylines = {};

  Object.keys(ROUTES).forEach(function(routeId){
    var cfg = ROUTES[routeId];
    var pts = POINTS.filter(function(p){return p.route===routeId}).map(function(p){return [p.lng,p.lat]});
    if(pts.length<2)return;
    var polyline = new AMap.Polyline({
      path: pts,
      strokeColor: cfg.color,
      strokeWeight: 3,
      strokeOpacity: 0.55,
      strokeStyle: 'dashed',
      strokeDasharray: [12, 8],
      lineJoin: 'round',
      showDir: true,
      zIndex: 10
    });
    polyline.setMap(map);
    polylines[routeId] = polyline;
  });
}

/* ================================================================
   REFRESH ROUTE — 切换显示/隐藏标记和路线
   ================================================================ */
function refreshRoute(){
  if(!map)return;

  // 标记可见性
  POINTS.forEach(function(point){
    var marker = markers[point.id];
    if(!marker)return;
    if(currentRoute==='all' || point.route===currentRoute){
      marker.show();
      marker.setOptions({opacity:1});
    }else{
      // 非当前路线标记半透明
      marker.show();
      marker.setOptions({opacity:0.15});
    }
  });

  // 路线可见性
  Object.keys(polylines).forEach(function(rid){
    var pl = polylines[rid];
    if(!pl)return;
    if(currentRoute==='all' || currentRoute===rid){
      pl.show();
      pl.setOptions({strokeOpacity:0.7});
    }else{
      pl.show();
      pl.setOptions({strokeOpacity:0.08});
    }
  });

  // 缩放至区域
  if(currentRoute!=='all'){
    fitRouteView(currentRoute);
  }else{
    // 全部路线 → 缩放至武汉三镇
    map.setZoomAndCenter(MAP_ZOOM, MAP_CENTER);
  }
}

function fitRouteView(routeId){
  if(!map)return;
  var pts = POINTS.filter(function(p){return p.route===routeId});
  if(!pts.length)return;

  // 收集当前路线的所有标记
  var overs = pts.map(function(p){return markers[p.id]}).filter(Boolean);
  if(overs.length===0)return;

  // 使用 setFitView 聚焦到这些标记
  map.setFitView(overs, false, [60, 60, 60, 60]);
}

/* ================================================================
   DETAIL CARD — 打开详情卡片
   ================================================================ */
function openDetail(pointId){
  if(activeInfoWindow){
    try{map.clearInfoWindow()}catch(e){}
    activeInfoWindow = null;
  }
  detailPointId = pointId;
  var point = findPoint(pointId);
  if(!point)return;
  var cfg = ROUTES[point.route];
  var overlay = document.getElementById('detailOverlay');
  var card = document.getElementById('detailCard');

  overlay.style.setProperty('--route-color', cfg.color);
  card.style.setProperty('--route-color', cfg.color);

  var stepsHTML = (point.steps||[]).map(function(s){return '<li>'+s+'</li>'}).join('');
  var yearNum = (point.year||'').replace(/[^0-9]/g,'');

  var unlockHTML = '';
  if(isUnlocked(pointId)){
    unlockHTML = '<div class="unlock-section"><h4>✅ 已解锁</h4><p style="font-size:12px;color:var(--ink-light);font-family:var(--font-display)">你已解码这段历史记忆</p></div>';
  }else{
    unlockHTML =
    '<div class="unlock-section">'+
      '<h4>🔓 解锁这段历史</h4>'+
      '<ul class="unlock-steps">'+stepsHTML+'</ul>'+
      '<button class="btn-unlock" style="background:'+cfg.color+'" id="unlockBtn'+pointId+'" onclick="doUnlock(\''+pointId+'\')">📷 解锁 · '+point.year+'年记忆</button>'+
    '</div>';
  }

  // 老照片URL（如果有）
  var hasPhoto = !!point.photoUrl;

  card.innerHTML =
    '<div class="card-color-bar" style="background:'+cfg.color+'"></div>'+
    '<div class="card-header">'+
      '<div class="card-num" style="color:'+cfg.color+'">'+point.id+'</div>'+
      '<div class="card-info">'+
        '<div class="card-name">'+point.name+'</div>'+
        '<div class="card-year" style="color:'+cfg.color+'">'+point.year+'年 · '+cfg.name+'</div>'+
      '</div>'+
      '<button class="card-close" onclick="closeDetail()">✕</button>'+
    '</div>'+
    '<div class="card-body">'+

      '<!-- 老照片卡片 -->'+
      '<div class="photo-card-title"><span>📷</span> 今昔对比</div>'+
      '<div class="photo-dual">'+
        // 左侧：老照片
        '<div class="photo-box photo-box-old">'+
          (hasPhoto ?
            '<div class="photo-box-img blurred" id="oldPhotoImg'+pointId+'" style="background-image:url(\''+point.photoUrl+'\')"></div>' :
            '<div class="photo-box-inner"><div class="photo-box-emoji">📷</div><div style="font-size:10px;color:var(--ink-light);text-align:center;line-height:1.4">老照片待补充<br>'+point.oldPhoto+'</div></div>'
          )+
          '<div class="photo-box-label" style="position:absolute;bottom:6px;right:6px;z-index:2">'+point.year+'年</div>'+
        '</div>'+
        // 右侧：现场拍摄
        '<div class="photo-box photo-box-now">'+
          '<div class="photo-box-inner"><div class="photo-box-emoji">🏛️</div><div style="font-size:10px;color:var(--ink-light);text-align:center">现在的<br>'+point.name+'</div></div>'+
          '<div class="photo-box-label" style="position:absolute;bottom:6px;left:6px;z-index:2">如今</div>'+
        '</div>'+
      '</div>'+

      '<!-- 对比滑块 -->'+
      '<div class="compare-slider-wrap">'+
        '<span>'+yearNum+'年</span>'+
        '<input type="range" class="compare-slider" min="0" max="100" value="50" oninput="moveCompare(\''+pointId+'\',this.value)">'+
        '<span>现在</span>'+
      '</div>'+

      '<!-- 任务 -->'+
      '<div class="card-task-box">'+
        '<span class="task-icon">📜</span>'+
        '<span class="task-text">'+point.task+'</span>'+
      '</div>'+

      unlockHTML+

    '</div>';

  overlay.classList.add('show');
}

function moveCompare(pointId, val){
  var img = document.getElementById('oldPhotoImg'+pointId);
  if(!img)return;
  img.style.clipPath = 'inset(0 '+(100-val)+'% 0 0)';
}

function closeDetail(){
  document.getElementById('detailOverlay').classList.remove('show');
  detailPointId = null;
}

/* ================================================================
   UNLOCK — 老照片显影动画
   ================================================================ */
function doUnlock(pointId){
  if(isUnlocked(pointId))return;
  var point = findPoint(pointId);
  if(!point)return;
  var cfg = ROUTES[point.route];

  // 老照片从模糊到清晰
  var oldImg = document.getElementById('oldPhotoImg'+pointId);
  if(oldImg){
    oldImg.classList.remove('blurred');
    oldImg.classList.add('clearing');
    setTimeout(function(){oldImg.classList.remove('clearing');oldImg.classList.add('clear')}, 800);
  }

  // 禁用按钮
  var btn = document.getElementById('unlockBtn'+pointId);
  if(btn){btn.disabled=true;btn.textContent='📷 正在显影...';btn.classList.add('success')}

  // 2秒后完成
  setTimeout(function(){
    setUnlocked(pointId);
    // 重建标记（HTML content方式）
    var marker = markers[pointId];
    if(marker){
      marker.setContent(createMarkerHTML(point));
      marker.setzIndex(100);
    }
    updateAllUI();
    refreshRoute();
    if(btn){btn.textContent='✅ 已解锁 · '+point.year+'年记忆';btn.classList.add('success')}

    // Toast
    var toast = document.getElementById('toast');
    toast.querySelector('.toast-emoji').textContent = '📜';
    toast.querySelector('.toast-sub').textContent = '解锁：'+point.name+'（'+point.year+'年）';
    toast.classList.add('show');
    setTimeout(function(){toast.classList.remove('show')}, 2200);

    // 路线完成
    if(countRoute(point.route)===10){
      setTimeout(function(){
        var t = document.getElementById('toast');
        t.querySelector('.toast-emoji').textContent = '🏅';
        t.querySelector('.toast-sub').textContent = cfg.name+' · 全部解锁！';
        t.classList.add('show');
        setTimeout(function(){t.classList.remove('show')}, 3000);
      }, 2400);
    }

    // 全部40个解锁
    if(totalUnlocked()===40){
      setTimeout(startFireworks, 2600);
      setTimeout(function(){
        var t = document.getElementById('toast');
        t.querySelector('.toast-emoji').textContent = '🏆';
        t.querySelector('.toast-sub').textContent = '江城往事 · 完全解码！1800年历史尽在眼前';
        t.classList.add('show');
        setTimeout(function(){t.classList.remove('show')}, 4000);
      }, 3500);
    }
  }, 2000);
}

/* ================================================================
   ROUTE SWITCHING
   ================================================================ */
function switchRoute(routeId){
  currentRoute = routeId;

  // 更新 Tab 高亮
  document.querySelectorAll('.tab-btn').forEach(function(btn){
    if(btn.dataset.route===routeId){
      btn.classList.add('active');
    }else{
      btn.classList.remove('active');
    }
  });

  // 更新底部"全部路线"按钮
  var btnAll = document.getElementById('btnAllRoutes');
  if(btnAll){
    if(routeId==='all'){btnAll.classList.add('active')}
    else{btnAll.classList.remove('active')}
  }

  refreshRoute();
  updateBottomBar();
}

/* ================================================================
   UI UPDATES
   ================================================================ */
function updateAllUI(){
  var total = totalUnlocked();
  document.getElementById('totalCount').textContent = total;
  document.getElementById('totalBar').style.width = (total/40*100)+'%';

  document.querySelectorAll('.tab-btn').forEach(function(btn){
    var rid = btn.dataset.route;
    if(!rid||!ROUTES[rid])return;
    var cnt = countRoute(rid);
    var countEl = btn.querySelector('.tab-count');
    if(countEl)countEl.textContent = cnt+'/10';
    if(cnt===10&&countEl)countEl.style.color='var(--success)';
  });
  updateBottomBar();
  updateRecent();
}

function updateBottomBar(){
  var el = document.getElementById('bottomProgress');
  if(!el)return;
  if(currentRoute==='all'){
    el.innerHTML = '🗺️ 全部路线 <strong>'+totalUnlocked()+'/40</strong>';
  }else{
    var cfg = ROUTES[currentRoute];
    if(!cfg)return;
    el.innerHTML = cfg.icon+' '+cfg.name+' <strong style="color:'+cfg.color+'">'+countRoute(currentRoute)+'/10</strong>';
  }
}

function updateRecent(){
  var el = document.getElementById('bottomRecent');
  if(!el)return;
  var recent = POINTS.filter(function(p){return isUnlocked(p.id)}).slice(-3).reverse();
  el.innerHTML = '';
  if(recent.length===0){
    for(var i=0;i<3;i++)el.innerHTML+='<div class="bottom-recent-item placeholder">📜</div>';
  }else{
    recent.forEach(function(p){
      var cfg = ROUTES[p.route];
      el.innerHTML+='<div class="bottom-recent-item" style="border-color:'+cfg.color+'44;background:'+cfg.color+'11;font-size:17px">🏛️</div>';
    });
    for(var j=recent.length;j<3;j++)el.innerHTML+='<div class="bottom-recent-item placeholder">📜</div>';
  }
}

/* ================================================================
   FIREWORKS
   ================================================================ */
let fwActive=false, fwRAF=null;
const particles=[];
function startFireworks(){
  fwActive=true;
  var c = document.getElementById('fireworksCanvas');
  c.classList.add('active');
  c.width = window.innerWidth;
  c.height = window.innerHeight;
  var ctx = c.getContext('2d');
  function spawn(){
    var cx = Math.random()*c.width;
    var cy = Math.random()*c.height*0.5;
    var cols = ['#C75B39','#8B4513','#D4A574','#5F9EA0','#B8860B','#D2691E','#CD853F'];
    var col = cols[Math.floor(Math.random()*cols.length)];
    for(var i=0;i<50;i++){
      var a = Math.random()*Math.PI*2;
      var s = 2+Math.random()*5;
      particles.push({x:cx,y:cy,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:1,decay:0.01+Math.random()*0.02,color:col,size:1.5+Math.random()*2.5});
    }
  }
  function anim(){
    if(!fwActive)return;
    ctx.globalCompositeOperation='destination-out';
    ctx.fillStyle='rgba(0,0,0,.16)';
    ctx.fillRect(0,0,c.width,c.height);
    ctx.globalCompositeOperation='lighter';
    for(var i=particles.length-1;i>=0;i--){
      var p=particles[i];p.x+=p.vx;p.y+=p.vy;p.vy+=0.04;p.life-=p.decay;
      if(p.life<=0){particles.splice(i,1);continue}
      ctx.fillStyle=p.color;ctx.globalAlpha=p.life;
      ctx.beginPath();ctx.arc(p.x,p.y,p.size,0,Math.PI*2);ctx.fill();
    }
    ctx.globalAlpha=1;
    fwRAF=requestAnimationFrame(anim);
  }
  var bursts=0;
  var iv=setInterval(function(){
    spawn();bursts++;
    if(bursts>=12){
      clearInterval(iv);
      setTimeout(function(){
        fwActive=false;
        cancelAnimationFrame(fwRAF);
        ctx.clearRect(0,0,c.width,c.height);
        c.classList.remove('active');
      },1800);
    }
  },380);
  anim();
}

/* ================================================================
   INIT
   ================================================================ */
function init(){
  updateAllUI();
  updateBottomBar();
  updateRecent();
  if(typeof AMap!=='undefined'){
    initMap();
  }
  // 5秒后仍未加载则降级
  setTimeout(function(){
    if(!mapLoaded)showFallback();
  },5000);
}

// 高德地图加载回调
window.onAMapLoad = function(){
  initMap();
};

document.addEventListener('DOMContentLoaded', init);

document.addEventListener('keydown', function(e){
  if(e.key==='Escape')closeDetail();
});

// 窗口大小变化时调整地图
window.addEventListener('resize', function(){
  if(fwActive){
    var c = document.getElementById('fireworksCanvas');
    if(c){c.width=window.innerWidth;c.height=window.innerHeight}
  }
});
</script>
